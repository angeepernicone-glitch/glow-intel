name: Auto-publish post

on:
  # Run Mon, Wed, Fri at 9am UTC (adjust timezone as needed)
  schedule:
    - cron: '0 9 * * 1,3,5'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node content-pipeline/generate-post.js

      - name: Commit and push new post
        run: |
          git config user.name "Glow Intel Bot"
          git config user.email "bot@glowintel.com"
          git add src/content/blog/ content-pipeline/keyword-queue.json
          git diff --staged --quiet || git commit -m "auto: publish scheduled post [skip ci]"
          git push
